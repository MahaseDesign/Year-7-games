<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Teacher Dashboard</h1>
    <div>
        <label for="pin">Enter PIN:</label>
        <input type="password" id="pin" />
        <button onclick="authenticate()">Authenticate</button>
        <p id="authMessage" class="hidden">Authentication Failed</p>
    </div>
    <div id="leaderboard" class="hidden">
        <h2>Leaderboard</h2>
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <!-- Leaderboard data will be populated here -->
            </tbody>
        </table>
    </div>
    <button onclick="toggleTheme()">Toggle Theme</button>
    <button onclick="exportCSV()">Export CSV</button>
    <div id="reporting" class="hidden">
        <h2>Proof of Learning Reporting</h2>
        <div id="reportData">
            <!-- Reporting data will be populated here -->
        </div>
    </div>
    <script>
        const users = [{ pin: '1234', name: 'John Doe' }];
        const scores = [{ name: 'Alice', score: 95 }, { name: 'Bob', score: 89 }];
        
        function authenticate() {
            const pin = document.getElementById('pin').value;
            const authMessage = document.getElementById('authMessage');
            if (users.some(user => user.pin === pin)) {
                authMessage.classList.add('hidden');
                displayLeaderboard();
                document.getElementById('leaderboard').classList.remove('hidden');
            } else {
                authMessage.classList.remove('hidden');
            }
        }
        
        function displayLeaderboard() {
            const leaderboardBody = document.getElementById('leaderboardBody');
            scores.forEach(({ name, score }) => {
                const row = leaderboardBody.insertRow();
                const cellName = row.insertCell(0);
                const cellScore = row.insertCell(1);
                cellName.textContent = name;
                cellScore.textContent = score;
            });
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
        }
        
        function exportCSV() {
            const csvData = scores.map(({ name, score }) => `${name},${score}`).join('\n');
            const blob = new Blob([csvData], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'leaderboard.csv');
            a.click();
        }
    </script>
</body>
</html>
